http {
    server {
        listen 80;

        # --- 🛡️ GLOBAL CORS SETTINGS ---
        # We use $http_origin to allow WHATEVER local port your frontend is on (3000 or 3002)
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Accept,Origin,User-Agent,DNT,Cache-Control,X-Mx-ReqToken,Keep-Alive,X-Requested-With,If-Modified-Since' always;

        # --- 1. AUTH SERVICE ---
        location /api/auth {
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            proxy_pass http://auth-service:3001;
        }

        # --- 2. ROADMAP SERVICE ---
        location /api/roadmap {
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            # Inside Docker, we'll keep Roadmap on 3002 internally
            proxy_pass http://roadmap-service:3002;
        }

        # --- 3. REPO SERVICE (The missing piece!) ---
        location /api/repo {
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            proxy_pass http://repo-service:3003;
        }
    }
}