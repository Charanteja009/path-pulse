name: Build and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

  test-services:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    # We can add more tests here later if services have test scripts
    - name: Install Auth Service deps
      working-directory: ./services/auth-service
      run: npm install

    - name: Install Repo Service deps
      working-directory: ./services/repo-service
      run: npm install

    - name: Install Roadmap Service deps
      working-directory: ./services/roadmap-service
      run: npm install

  deploy-frontend:
    needs: [build-frontend, test-services]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' # ONLY RUN MANUALLY
    steps:
    - uses: actions/checkout@v3
    - name: Deploy to Vercel
      uses: amondnet/vercel-action@v20
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./frontend
        vercel-args: '--prod'

  deploy-backend:
    needs: [build-frontend, test-services]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' # ONLY RUN MANUALLY
    steps:
    - uses: actions/checkout@v3
    # Deploy to Render via Deploy Hooks
    # These URLs will need to be configured in GitHub Secrets
    - name: Trigger Auth Service Deploy
      run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}
      continue-on-error: true

    - name: Trigger Roadmap Service Deploy
      run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_ROADMAP }}
      continue-on-error: true

    - name: Trigger Repo Service Deploy
      run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_REPO }}
      continue-on-error: true

    - name: Trigger API Gateway Deploy
      run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_GATEWAY }}
      continue-on-error: true
